[tool.ruff]
target-version = "py312"
line-length = 100
src = ["kinito", "content", "tests", "Kinito.py"]

[tool.ruff.lint]
select = [
    "E",   # pycodestyle errors
    "W",   # pycodestyle warnings
    "F",   # pyflakes
    "I",   # isort
    "UP",  # pyupgrade
    "B",   # flake8-bugbear
    "SIM", # flake8-simplify
]
ignore = [
    "E501",   # line length — dialogue/content strings are often long
    "SIM108", # ternary sometimes less readable in UI code
    "SIM105", # try/except/pass is intentional in tkinter cleanup paths
]

[tool.ruff.lint.per-file-ignores]
"tests/**" = ["SIM117"]  # nested with blocks are fine in tests

[tool.ruff.lint.isort]
known-first-party = ["kinito", "content"]
